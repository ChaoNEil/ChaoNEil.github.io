<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
</head>
<style type="text/css">
    * {
        margin: 0;
        padding: 0;
    }
    
    body {
        overflow: hidden;
    }
    
    #vanta-canvas {
        width: 100%;
        height: 100vh;
    }
    
    #baseline {
        position: relative;
        width: 50%;
        height: 300px;
        padding-left: 50px;
        top: -500px;
        left: 500px;
    }
</style>
</head>

<body>
    <div id="vanta-canvas"></div>
    <div id="baseline">
        <h1>Website in Progress!</h1>
        <h2>Admin login</h2>
        <br>   
        <label for ="username">Username</label>
        <input type="text" id="username" onfocus="go()">
        <label for ="password">Password</label>
        <input type="password" id="password" onfocus="go()">
        <button onclick ="go()">Login</button>
        <br><br>
        <h2><a href="https://www.google.com/search?q=how+to+reset+a+password&oq=how+to+r&aqs=chrome.0.69i59l2j69i57j35i39j0i20i263i512j69i60l2j69i61.1961j0j7&sourceid=chrome&ie=UTF-8">Reset password?</a></h2>
        <!-- dont laught at this :') -->
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
    <script type="text/javascript">
        VANTA.BIRDS({
            el: "#vanta-canvas",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            backgroundColor: 0xdfdfff,
            color1: 0x612121,
            color2: 0x1c13ac,
            quantity: 4.00
           
        })

        function go(){
            window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        }
    </script>
</body>

</html>
